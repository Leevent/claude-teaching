<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的 Claude 使用力落在哪個等級？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF8F0;
      --bg-card: #FFFFFF;
      --accent: #D4764E;
      --accent-light: #E8A87C;
      --accent-gold: #D4A574;
      --text: #2D2016;
      --text-sec: #6B5B4E;
      --text-muted: #9B8B7E;
      --border: #E8DDD4;
      --shadow: rgba(45, 32, 22, 0.08);
      --success: #6BAF7B;
      --lv-beginner: #7EADD2;
      --lv-intermediate: #D4A574;
      --lv-advanced: #D4764E;
      --radius: 16px;
      --radius-sm: 12px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      width: 100%;
      max-width: 560px;
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 48px 24px 40px;
      animation: fadeUp .5s ease;
    }
    .welcome-emoji { font-size: 64px; margin-bottom: 16px; }
    .welcome h1 {
      font-size: 1.75rem;
      font-weight: 900;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .welcome .subtitle {
      font-size: 1.05rem;
      color: var(--text-sec);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .welcome .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .welcome .meta span { margin: 0 6px; }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
      box-shadow: 0 4px 16px rgba(212,118,78,.25);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(212,118,78,.35); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: var(--text-sec);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--accent-light); color: var(--accent); }

    .footer-note {
      margin-top: 28px;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── Progress ── */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .progress-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 46px;
    }
    .progress-bar {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-light), var(--accent));
      border-radius: 99px;
      transition: width .4s ease-out;
    }

    /* ── Question ── */
    .question-screen { animation: fadeUp .35s ease; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 20px;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--accent); }

    .q-number {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .q-text {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s, box-shadow .2s;
      position: relative;
      user-select: none;
    }
    .option-card:hover {
      border-color: var(--accent-light);
      box-shadow: 0 2px 12px var(--shadow);
      transform: translateY(-1px);
    }
    .option-card.selected {
      border-color: var(--accent);
      background: rgba(212,118,78,.06);
      transform: scale(1.01);
    }
    .option-card.selected::after {
      content: '\2713';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-weight: 700;
      font-size: 1.1rem;
    }
    .option-label {
      display: inline-block;
      font-weight: 700;
      color: var(--accent);
      margin-right: 6px;
    }

    /* ── Form ── */
    .form-screen {
      animation: fadeUp .4s ease;
      text-align: center;
    }
    .form-screen h2 {
      font-size: 1.35rem;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .form-screen .form-sub {
      color: var(--text-sec);
      font-size: 0.92rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-sec);
      margin-bottom: 6px;
    }
    .form-group label .req { color: var(--accent); }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg-card);
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--accent-light); }
    .form-group input.error { border-color: #d9534f; }
    .form-error {
      font-size: 0.8rem;
      color: #d9534f;
      margin-top: 4px;
      display: none;
    }
    .form-error.show { display: block; }
    .form-privacy {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      text-align: center;
    }

    /* ── Result ── */
    .result-screen { animation: fadeUp .5s ease; }

    .result-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px var(--shadow);
      padding: 36px 28px 28px;
      text-align: center;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
    }
    .result-card[data-level="beginner"]::before { background: var(--lv-beginner); }
    .result-card[data-level="intermediate"]::before { background: var(--lv-intermediate); }
    .result-card[data-level="advanced"]::before { background: var(--lv-advanced); }

    .result-emoji { font-size: 56px; margin-bottom: 8px; }
    .result-title {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .result-level {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 12px;
    }
    .result-stars { font-size: 1.3rem; margin-bottom: 16px; letter-spacing: 4px; }

    .score-bar-wrap {
      max-width: 280px;
      margin: 0 auto 16px;
    }
    .score-bar {
      height: 10px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .score-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1s ease-out;
    }
    .score-fill[data-level="beginner"] { background: var(--lv-beginner); }
    .score-fill[data-level="intermediate"] { background: var(--lv-intermediate); }
    .score-fill[data-level="advanced"] { background: var(--lv-advanced); }
    .score-text {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .result-desc {
      font-size: 0.95rem;
      color: var(--text-sec);
      line-height: 1.7;
      margin-top: 16px;
    }

    .result-brand {
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .result-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
      text-align: left;
    }
    .result-section h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .result-list {
      list-style: none;
      padding: 0;
    }
    .result-list li {
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 6px 0;
      padding-left: 24px;
      position: relative;
      color: var(--text-sec);
    }
    .result-list li::before {
      position: absolute;
      left: 0;
      top: 6px;
    }
    .result-list.strengths li::before { content: '\2714'; color: var(--success); }
    .result-list.next li::before { content: '\2192'; color: var(--accent); }

    /* Course recommendation */
    .course-rec {
      background: linear-gradient(135deg, rgba(212,118,78,.06), rgba(232,168,124,.08));
      border: 2px solid var(--accent-light);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    .course-rec h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--accent);
    }
    .course-rec-detail {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text-sec);
      margin-bottom: 8px;
    }
    .course-rec-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
    }
    .course-rec-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 16px 12px 40px; }
      .welcome { padding: 36px 16px 32px; }
      .welcome h1 { font-size: 1.45rem; }
      .q-text { font-size: 1.1rem; }
      .option-card { padding: 14px 16px; font-size: 0.9rem; }
      .result-card { padding: 28px 20px 24px; }
      .result-level { font-size: 1.35rem; }
      .result-section { padding: 20px 18px; }
      .btn-primary { padding: 14px 32px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ═════════════════════════════════
    //  DATA: 15 Questions
    // ═════════════════════════════════
    const QUESTIONS = [
      {
        id: 1, cat: 'beginner', type: 'knowledge',
        q: '你知道 Claude 是誰家的小孩嗎？ 🤔',
        opts: [
          { text: 'OpenAI 的吧？', score: 0 },

      },

          { text: '重問一次，換個方式講', score: 1 },
          { text: '追問修正：「不是這個方向，我要的是⋯」', score: 2 },
          { text: '分析偏差原因，調 prompt 結構（加範例、限格式、拆步驟）', score: 3 },

      },
      {
        id: 4, cat: 'beginner', type: 'knowledge',

      {

        q: '「Projects（專案）」功能，聽過嗎？ 📂',

          { text: '第一次聽說欸', score: 0 },
          { text: '聽過，但還沒用過', score: 1 },
          { text: '有在用！會設 Custom Instructions 和上傳參考資料', score: 2 },
          { text: '針對不同工作場景都建了專屬 Project，各有一套指令和知識庫', score: 3 },
        ]
      },
      {
        id: 6, cat: 'intermediate', type: 'feature',
        q: 'Artifacts（互動文件）用過嗎？',
        opts: [
          { text: '那是什麼？🫠', score: 0 },
          { text: '好像看過 Claude 跳出一個側邊欄？不太確定', score: 1 },
          { text: '用過，會叫 Claude 產程式碼、文件或圖表', score: 2 },
          { text: '經常用！反覆迭代修改，也產過互動式視覺化', score: 3 },
        ]
      },
      {
        id: 7, cat: 'intermediate', type: 'knowledge',
        q: 'Haiku、Sonnet、Opus⋯你會挑模型嗎？ 🎯',
        opts: [
          { text: '蛤？Claude 有分型號？', score: 0 },
          { text: '知道有，但都用預設的', score: 1 },
          { text: '會根據任務挑：簡單用 Haiku、複雜用 Sonnet 或 Opus', score: 2 },
          { text: '了解各模型的速度 / 能力 / 成本差異，會策略性搭配', score: 3 },
        ]
      },
      {
        id: 8, cat: 'intermediate', type: 'scenario',
        q: '要分析一份 30 頁的 PDF 報告，你會怎麼做？ 📄',
        opts: [
          { text: '等等，Claude 可以讀 PDF？', score: 0 },
          { text: '直接丟上去：「幫我摘要」', score: 1 },
          { text: '上傳後指定分析角度：「列出前三大風險」「比較 A 和 B」', score: 2 },
          { text: '先給分析框架 + 角色設定，分段提取重點，交叉驗證數據', score: 3 },

      },
      {
        id: 9, cat: 'intermediate', type: 'knowledge',
        q: '「Context Window（上下文窗口）」是什麼？跟你有關係嗎？',

          { text: '沒聽過這個詞', score: 0 },

      {
        id: 10, cat: 'intermediate', type: 'scenario',

      {
        id: 11, cat: 'advanced', type: 'feature',

          { text: '組合多種技巧：few-shot + CoT + structured output，還會請 Claude 自我評估', score: 3 },

      },
      {
        id: 13, cat: 'advanced', type: 'scenario',
        q: '你有重複性的工作流程嗎？怎麼跟 Claude 搭配？ 🔄',

          { text: '在 Project 裡設好 Custom Instructions，每次貼新資料就好', score: 2 },

      },
      {

        q: 'MCP 工具和 Styles（回應風格），你碰過嗎？ 🔧',

          { text: '完全沒聽過這兩個', score: 0 },
          { text: '聽過其中一個，但還沒用', score: 1 },
          { text: '用過 Styles 設風格，或知道 MCP 可以擴充 Claude 的能力', score: 2 },
          { text: '兩個都用過，MCP 串外部工具，Styles 也建了自訂風格', score: 3 },

      },
      {
        id: 15, cat: 'advanced', type: 'scenario',
        q: 'Claude 講錯話（幻覺）的時候，你怎麼處理？ 🔍',
        opts: [
          { text: '通常不太會注意到，就直接採用了', score: 0 },

    // ═════════════════════════════════
    //  DATA: Level Results
    // ═════════════════════════════════
    const LEVELS = {
      beginner: {
        key: 'beginner',
        name: '初級探索者',
        emoji: '🌱',
        stars: 1,
        color: 'var(--lv-beginner)',

        next: [

          '認識不同模型的差異（Haiku / Sonnet / Opus）',
        ],
        courseRec: {
          name: 'A 班：Claude 從入門到上手',
          detail: '這堂課會帶你解鎖 Projects、Cowork 等核心功能，讓 Claude 從「聊天對象」變成你的「工作夥伴」。',
          meta: '3/24（二）20:00-22:00 ｜ 2 小時 ｜ 有回放',
        }
      },
      intermediate: {
        key: 'intermediate',
        name: '中級實踐者',
        emoji: '🚀',
        stars: 2,
        color: 'var(--lv-intermediate)',
        desc: '你已經不只是問問題了——你懂得運用 Claude 各種功能來完成工作。Projects、Artifacts、模型選擇都有涉獵，是時候再往上推一個層次了！',
        strengths: [
          '能善用 Projects 管理不同工作情境',
          '熟悉檔案上傳與多輪對話技巧',

        ],
        next: [
          '解鎖 Extended Thinking 深度推理功能',
          '進階 Prompt 工程技巧（CoT、Few-shot）',
          '探索 MCP 工具擴展桌面版功能',
          '建立 Styles 自訂回應風格，統一產出品質',
        ],
        courseRec: {
          name: '兩堂都適合你！',
          detail: 'A 班幫你鞏固 Projects 和 Cowork 的進階用法；B 班帶你進入 Skill 設計和跨系統串接的世界。建議兩堂都報，效果最好 😎',
          meta: 'A 班 3/24（二）2hr ＋ B 班 4/9（四）3hr ｜ 皆有回放',
        }
      },
      advanced: {
        key: 'advanced',
        name: '高級策略家',
        emoji: '👑',
        stars: 3,
        color: 'var(--lv-advanced)',
        desc: '你是 Claude 深度使用者！不只會用，還懂得「為什麼這樣用」。能系統性設計 prompt、管理上下文、建立可重複的工作流。AI 對你來說已經是戰略級工具 🏆',
        strengths: [
          '精通 Prompt 工程多種進階技巧',
          '能建立系統化、可重複的 AI 工作流',
          '善用 Extended Thinking 處理複雜推理',
          '有完整的 AI 產出品質驗證策略',
        ],
        next: [
          '持續追蹤 Claude 新功能與模型更新',
          '把個人經驗整理成團隊可用的 SOP',
          '探索 Claude 在更廣泛工作系統中的整合',
          '進入 Claude Code 或 API 等開發者工具',
        ],
        courseRec: {
          name: 'B 班：Claude 從熟練到專案級應用',
          detail: '這堂課專為你設計——Skill 架構、跨生態串接、自動化工作流，讓你把 Claude 變成真正的團隊生產力引擎。',
          meta: '4/9（四）19:00-22:00 ｜ 3 小時 ｜ 有回放',
        }
      },
    };

    // ═════════════════════════════════
    //  STATE
    // ═════════════════════════════════
    const state = {
      screen: 'welcome', // welcome | quiz | form | result
      qi: 0,
      answers: {},
      name: '',
      email: '',
      result: null,
    };

    // ═════════════════════════════════
    //  SCORING
    // ═════════════════════════════════
    function calcResult() {
      let total = 0;
      QUESTIONS.forEach(q => {
        const sel = state.answers[q.id];
        if (sel !== undefined) total += q.opts[sel].score;
      });
      let level;
      if (total <= 15) level = 'beginner';
      else if (total <= 30) level = 'intermediate';
      else level = 'advanced';
      return { total, max: 45, pct: Math.round((total / 45) * 100), level };
    }

    // ═════════════════════════════════
    //  RENDER
    // ═════════════════════════════════
    function render() {
      const app = document.getElementById('app');
      switch (state.screen) {
        case 'welcome': app.innerHTML = htmlWelcome(); break;
        case 'quiz':    app.innerHTML = htmlQuiz(); break;
        case 'form':    app.innerHTML = htmlForm(); break;
        case 'result':  app.innerHTML = htmlResult(); break;
      }
      bind();
      if (state.screen === 'result') {
        requestAnimationFrame(() => {
          const fill = document.querySelector('.score-fill');
          if (fill) fill.style.width = state.result.pct + '%';
        });
      }
    }

    function htmlWelcome() {
      return `
        <div class="welcome">
          <div class="welcome-emoji">🧭</div>
          <h1>你的 Claude 使用力<br>落在哪個等級？</h1>
          <p class="subtitle">15 道輕鬆情境題，探索你目前的 AI 協作程度<br>不是考試，是一趟有趣的自我探索 ✨</p>
          <p class="meta">
            <span>📝 15 題</span>
            <span>·</span>
            <span>⏱ 約 3 分鐘</span>
            <span>·</span>
            <span>🎯 三等級評估</span>
          </p>
          <button class="btn-primary" data-action="start">開始測驗 →</button>
          <p class="footer-note">放大知識學院 出品</p>
        </div>`;
    }

    function htmlQuiz() {
      const q = QUESTIONS[state.qi];
      const pct = ((state.qi) / QUESTIONS.length * 100).toFixed(0);
      const selected = state.answers[q.id];
      const labels = ['A', 'B', 'C', 'D'];
      return `
        <div class="question-screen">
          <div class="progress-wrap">
            <span class="progress-label">${state.qi + 1}/${QUESTIONS.length}</span>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
          ${state.qi > 0 ? '<button class="back-btn" data-action="back">← 上一題</button>' : ''}
          <div class="q-number">Question ${state.qi + 1}</div>
          <p class="q-text">${q.q}</p>
          <div class="options">
            ${q.opts.map((o, i) => `
              <div class="option-card${selected === i ? ' selected' : ''}" data-action="select" data-idx="${i}">
                <span class="option-label">${labels[i]}.</span>${o.text}
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    function htmlForm() {
      return `
        <div class="form-screen">
          <div class="welcome-emoji">✨</div>
          <h2>就差一步！</h2>
          <p class="form-sub">填完就能看你的等級結果<br>我們也會寄學習建議到你的信箱 📬</p>
          <div class="form-group">
            <label>你的名字 <span class="req">*</span></label>
            <input type="text" id="inp-name" placeholder="怎麼稱呼你？" value="${esc(state.name)}">
            <div class="form-error" id="err-name">請填寫名字</div>
          </div>
          <div class="form-group">
            <label>Email <span class="req">*</span></label>
            <input type="email" id="inp-email" placeholder="your@email.com" value="${esc(state.email)}">
            <div class="form-error" id="err-email">請填寫有效的 Email</div>
          </div>
          <p class="form-privacy">🔒 你的資料僅用於課程學習建議，絕不會被濫用</p>
          <button class="btn-primary" data-action="submit-form">查看我的結果 →</button>
        </div>`;
    }

    function htmlResult() {
      const r = state.result;
      const lv = LEVELS[r.level];
      const starStr = '★'.repeat(lv.stars) + '☆'.repeat(3 - lv.stars);
      return `
        <div class="result-screen">
          <div class="result-card" data-level="${r.level}">
            <div class="result-emoji">${lv.emoji}</div>
            <div class="result-title">你的 Claude 使用等級</div>
            <div class="result-level">${starStr} ${lv.name}</div>
            <div class="result-stars"></div>
            <div class="score-bar-wrap">
              <div class="score-bar"><div class="score-fill" data-level="${r.level}" style="width:0%"></div></div>
              <div class="score-text">${r.total} / ${r.max} 分（${r.pct}%）</div>
            </div>
            <p class="result-desc">${lv.desc}</p>
            <p class="result-brand">放大知識學院</p>
          </div>

          <div class="course-rec">
            <h3>📚 推薦你報名</h3>
            <div class="course-rec-name">${lv.courseRec.name}</div>
            <p class="course-rec-detail">${lv.courseRec.detail}</p>
            <p class="course-rec-meta">${lv.courseRec.meta}</p>
          </div>

          <div class="result-section">
            <h3>✅ 你已經掌握的能力</h3>
            <ul class="result-list strengths">
              ${lv.strengths.map(s => `<li>${s}</li>`).join('')}
            </ul>
          </div>

          <div class="result-section">
            <h3>🎯 推薦你下一步學習</h3>
            <ul class="result-list next">
              ${lv.next.map(s => `<li>${s}</li>`).join('')}
            </ul>
          </div>

          <div class="result-actions">
            <button class="btn-primary" data-action="restart">重新測驗</button>
            <button class="btn-secondary" data-action="share">📸 截圖分享結果</button>
          </div>
        </div>`;
    }

    // ═════════════════════════════════
    //  EVENT BINDING
    // ═════════════════════════════════
    function bind() {
      document.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', handleAction);
      });
    }

    function handleAction(e) {
      const el = e.currentTarget;
      const action = el.dataset.action;

      if (action === 'start') {
        state.screen = 'quiz';
        state.qi = 0;
        state.answers = {};
        render();
      }

      if (action === 'select') {
        const idx = parseInt(el.dataset.idx);
        const q = QUESTIONS[state.qi];
        state.answers[q.id] = idx;

        // visual feedback
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');

        setTimeout(() => {
          if (state.qi < QUESTIONS.length - 1) {
            state.qi++;
            render();
          } else {
            state.screen = 'form';
            render();
          }
        }, 350);
      }

      if (action === 'back') {
        if (state.qi > 0) { state.qi--; render(); }
      }

      if (action === 'submit-form') {
        const name = document.getElementById('inp-name').value.trim();
        const email = document.getElementById('inp-email').value.trim();
        let valid = true;

        if (!name) {
          document.getElementById('inp-name').classList.add('error');
          document.getElementById('err-name').classList.add('show');
          valid = false;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById('inp-email').classList.add('error');
          document.getElementById('err-email').classList.add('show');
          valid = false;
        }

        if (!valid) return;
        state.name = name;
        state.email = email;
        state.result = calcResult();
        state.screen = 'result';

        // log to console for retrieval
        console.log('=== Quiz Submission ===');
        console.log('Name:', state.name);
        console.log('Email:', state.email);
        console.log('Score:', state.result.total, '/', state.result.max);
        console.log('Level:', state.result.level);
        console.log('========================');

        render();
      }

      if (action === 'restart') {
        state.screen = 'welcome';
        state.qi = 0;
        state.answers = {};
        state.name = '';
        state.email = '';
        state.result = null;
        render();
      }

      if (action === 'share') {
        const card = document.querySelector('.result-card');
        if (card) {
          card.style.outline = '3px solid var(--accent-light)';
          card.style.outlineOffset = '4px';
          setTimeout(() => {
            card.style.outline = 'none';
            card.style.outlineOffset = '0';
          }, 2000);
          alert('請截圖上方的結果卡片分享給朋友！📸\n（卡片已標記，截完圖會自動取消框線）');
        }
      }
    }

    // clear errors on input
    document.addEventListener('input', e => {
      if (e.target.tagName === 'INPUT') {
        e.target.classList.remove('error');
        const errId = 'err-' + e.target.id.replace('inp-', '');
        const errEl = document.getElementById(errId);
        if (errEl) errEl.classList.remove('show');
      }
    });

    // ═════════════════════════════════
    //  UTILS
    // ═════════════════════════════════
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ═════════════════════════════════
    //  INIT
    // ═════════════════════════════════
    render();
  </script>
</body>
</html>
