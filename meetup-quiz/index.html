<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你是 Claude 幾段高手？｜台中 Claude 小聚</title>
  <meta name="description" content="15 題情境測驗，找出你的 AI 協作段位。從小白到大神，7 個等級等你挑戰。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0E17;
      --bg-card: #1A1929;
      --bg-card-hover: #232136;
      --accent: #FF8906;
      --accent-light: #FFAB40;
      --accent-dim: rgba(255,137,6,.12);
      --text: #FFFFFE;
      --text-sec: #B8B5C8;
      --text-muted: #6B6882;
      --border: #2E2B3F;
      --shadow: rgba(0,0,0,.35);
      --success: #6BAF7B;

      --lv-7: #7B8794;
      --lv-6: #7EADD2;
      --lv-5: #6BAF7B;
      --lv-4: #D4A574;
      --lv-3: #E8A87C;
      --lv-2: #FF8906;
      --lv-1: #FF5C5C;

      --radius: 16px;
      --radius-sm: 12px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      width: 100%;
      max-width: 560px;
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 48px 24px 40px;
      animation: fadeUp .5s ease;
    }
    .welcome-emoji { font-size: 64px; margin-bottom: 16px; }
    .welcome h1 {
      font-size: 1.75rem;
      font-weight: 900;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .welcome h1 .accent { color: var(--accent); }
    .welcome .subtitle {
      font-size: 1.05rem;
      color: var(--text-sec);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .welcome .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .welcome .meta span { margin: 0 6px; }
    .level-preview {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .level-preview .lp-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 10px;
    }
    .level-preview .lp-dot .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--accent);
      color: #0F0E17;
      border: none;
      border-radius: 999px;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
      box-shadow: 0 4px 16px rgba(255,137,6,.25);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,137,6,.4); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: var(--text-sec);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: var(--accent);
      border: none;
      padding: 8px 16px;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-ghost:hover { opacity: .8; }

    .footer-note {
      margin-top: 28px;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── Progress ── */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .progress-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 46px;
    }
    .progress-bar {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 99px;
      transition: width .4s ease-out;
    }

    /* ── Question ── */
    .question-screen { animation: fadeUp .35s ease; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 20px;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--accent); }

    .q-number {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .q-text {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-sec);
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s, box-shadow .2s;
      position: relative;
      user-select: none;
    }
    .option-card:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
      box-shadow: 0 2px 12px var(--shadow);
      transform: translateY(-1px);
    }
    .option-card.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: scale(1.01);
    }
    .option-card.selected::after {
      content: '\2713';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-weight: 700;
      font-size: 1.1rem;
    }
    .option-label {
      display: inline-block;
      font-weight: 700;
      color: var(--accent);
      margin-right: 6px;
    }

    /* ── Form ── */
    .form-screen {
      animation: fadeUp .4s ease;
      text-align: center;
    }
    .form-screen h2 {
      font-size: 1.35rem;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .form-screen .form-sub {
      color: var(--text-sec);
      font-size: 0.92rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-sec);
      margin-bottom: 6px;
    }
    .form-group label .req { color: var(--accent); }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg-card);
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-muted); }
    .form-group input.error { border-color: #d9534f; }
    .form-error {
      font-size: 0.8rem;
      color: #d9534f;
      margin-top: 4px;
      display: none;
    }
    .form-error.show { display: block; }
    .form-privacy {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      text-align: center;
    }
    .skip-form {
      margin-top: 16px;
    }

    /* ── Result ── */
    .result-screen { animation: fadeUp .5s ease; }

    .result-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px var(--shadow);
      padding: 36px 28px 28px;
      text-align: center;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
    }
    .result-card[data-level="lv7"]::before { background: var(--lv-7); }
    .result-card[data-level="lv6"]::before { background: var(--lv-6); }
    .result-card[data-level="lv5"]::before { background: var(--lv-5); }
    .result-card[data-level="lv4"]::before { background: var(--lv-4); }
    .result-card[data-level="lv3"]::before { background: var(--lv-3); }
    .result-card[data-level="lv2"]::before { background: var(--lv-2); }
    .result-card[data-level="lv1"]::before { background: var(--lv-1); }

    .result-emoji { font-size: 56px; margin-bottom: 8px; }
    .result-title {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .result-level {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 6px;
    }
    .result-rank {
      font-size: 0.88rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 99px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .result-rank[data-level="lv7"] { background: rgba(123,135,148,.15); color: var(--lv-7); }
    .result-rank[data-level="lv6"] { background: rgba(126,173,210,.15); color: var(--lv-6); }
    .result-rank[data-level="lv5"] { background: rgba(107,175,123,.15); color: var(--lv-5); }
    .result-rank[data-level="lv4"] { background: rgba(212,165,116,.15); color: var(--lv-4); }
    .result-rank[data-level="lv3"] { background: rgba(232,168,124,.15); color: var(--lv-3); }
    .result-rank[data-level="lv2"] { background: rgba(255,137,6,.15); color: var(--lv-2); }
    .result-rank[data-level="lv1"] { background: rgba(255,92,92,.15); color: var(--lv-1); }

    .score-bar-wrap {
      max-width: 280px;
      margin: 0 auto 16px;
    }
    .score-bar {
      height: 10px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .score-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1s ease-out;
    }
    .score-fill[data-level="lv7"] { background: var(--lv-7); }
    .score-fill[data-level="lv6"] { background: var(--lv-6); }
    .score-fill[data-level="lv5"] { background: var(--lv-5); }
    .score-fill[data-level="lv4"] { background: var(--lv-4); }
    .score-fill[data-level="lv3"] { background: var(--lv-3); }
    .score-fill[data-level="lv2"] { background: var(--lv-2); }
    .score-fill[data-level="lv1"] { background: var(--lv-1); }
    .score-text {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .result-desc {
      font-size: 0.95rem;
      color: var(--text-sec);
      line-height: 1.7;
      margin-top: 16px;
    }

    .result-brand {
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .result-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
      text-align: left;
    }
    .result-section h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .result-list {
      list-style: none;
      padding: 0;
    }
    .result-list li {
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 6px 0;
      padding-left: 24px;
      position: relative;
      color: var(--text-sec);
    }
    .result-list li::before {
      position: absolute;
      left: 0;
      top: 6px;
    }
    .result-list.strengths li::before { content: '\2714'; color: var(--success); }
    .result-list.next li::before { content: '\2192'; color: var(--accent); }

    /* Meetup recommendation */
    .meetup-rec {
      background: linear-gradient(135deg, rgba(255,137,6,.08), rgba(255,171,64,.06));
      border: 2px solid rgba(255,137,6,.25);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    .meetup-rec h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--accent);
    }
    .meetup-rec-detail {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text-sec);
      margin-bottom: 8px;
    }
    .meetup-rec-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
    }
    .meetup-rec-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    /* 7-level gauge */
    .level-gauge {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 16px 0 8px;
    }
    .level-gauge .gauge-seg {
      width: 28px;
      height: 6px;
      border-radius: 3px;
      opacity: .25;
      transition: opacity .5s ease;
    }
    .level-gauge .gauge-seg.active { opacity: 1; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 16px 12px 40px; }
      .welcome { padding: 36px 16px 32px; }
      .welcome h1 { font-size: 1.45rem; }
      .q-text { font-size: 1.1rem; }
      .option-card { padding: 14px 16px; font-size: 0.9rem; }
      .result-card { padding: 28px 20px 24px; }
      .result-level { font-size: 1.35rem; }
      .result-section { padding: 20px 18px; }
      .btn-primary { padding: 14px 32px; font-size: 1rem; }
      .level-preview { gap: 4px; }
      .level-preview .lp-dot { font-size: 0.68rem; padding: 3px 8px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ═══════════════════════════════════
    //  DATA: 15 Questions (7-Level Differentiation)
    // ═══════════════════════════════════
    const QUESTIONS = [
      {
        id: 1,
        q: '你目前使用 AI 工具（Claude / ChatGPT 等）的頻率是？',
        opts: [
          { text: '幾乎沒用過，或只聽人提過', score: 0 },
          { text: '偶爾用一下，想到才開', score: 1 },
          { text: '每週固定在用，已融入部分工作', score: 2 },
          { text: '每天都用，它已經是我的工作核心工具', score: 3 },
        ]
      },
      {
        id: 2,
        q: '你知道 Claude 跟 ChatGPT 最大的差別在哪嗎？',
        opts: [
          { text: '不就都是 AI 聊天嗎？有差嗎', score: 0 },
          { text: '好像介面不一樣，但功能差不多吧', score: 1 },
          { text: '知道 Claude 是 Anthropic 做的，各有擅長的任務類型', score: 2 },
          { text: '清楚兩者的模型架構差異，會根據任務特性選擇使用', score: 3 },
        ]
      },
      {
        id: 3,
        q: 'Claude 回答品質不好的時候，你會怎麼做？',
        opts: [
          { text: '就⋯算了，或者去 Google', score: 0 },
          { text: '重新問一次，換個說法', score: 1 },
          { text: '給更多脈絡、限定格式、指定角色來引導它', score: 2 },
          { text: '分析哪個環節偏了，調整 prompt 結構或拆解任務重跑', score: 3 },
        ]
      },
      {
        id: 4,
        q: '「Projects（專案）」功能你用到什麼程度？',
        opts: [
          { text: '沒聽過這個功能', score: 0 },
          { text: '知道有，但還沒設過', score: 1 },
          { text: '有建幾個 Project，上傳過文件、寫過 Custom Instructions', score: 2 },
          { text: '每個工作場景都有專屬 Project，搭配知識庫和指令模板在跑', score: 3 },
        ]
      },
      {
        id: 5,
        q: '你平常寫 prompt 的方式最接近哪個？',
        opts: [
          { text: '直接打字問問題，想到什麼說什麼', score: 0 },
          { text: '會稍微整理一下問題，盡量講清楚', score: 1 },
          { text: '有結構：給角色、脈絡、目標、格式要求', score: 2 },
          { text: '組合 CoT + Few-shot + 分段指令，還會要求 Claude 自我檢驗', score: 3 },
        ]
      },
      {
        id: 6,
        q: '你怎麼處理重複性的工作任務？',
        opts: [
          { text: '每次都手動處理，還沒想過用 AI', score: 0 },
          { text: '偶爾會把上次的 prompt 複製來用', score: 1 },
          { text: '在 Project 裡設好指令模板，每次貼新資料就能跑', score: 2 },
          { text: '建了完整工作流：模板 + 知識庫 + 品質檢查，幾乎全自動化', score: 3 },
        ]
      },
      {
        id: 7,
        q: '模型選擇（Haiku / Sonnet / Opus）你怎麼處理？',
        opts: [
          { text: '有分型號？我都用預設的', score: 0 },
          { text: '知道有分，但不確定怎麼選', score: 1 },
          { text: '會根據任務選：簡單的用 Haiku、複雜的用 Opus', score: 2 },
          { text: '了解各模型的成本/速度/能力差異，會策略性混搭使用', score: 3 },
        ]
      },
      {
        id: 8,
        q: 'MCP（Model Context Protocol）工具，你碰過嗎？',
        opts: [
          { text: '完全沒聽過', score: 0 },
          { text: '聽過這個詞，好像是擴充功能？', score: 1 },
          { text: '裝過一兩個 MCP 工具，讓 Claude 能操作外部服務', score: 2 },
          { text: '已串接多個 MCP 服務，Claude 能直接操作我的檔案、日曆、專案管理', score: 3 },
        ]
      },
      {
        id: 9,
        q: '你用 Claude 做過最複雜的事是什麼等級？',
        opts: [
          { text: '問問題、聊天', score: 0 },
          { text: '寫文案、翻譯、整理資料', score: 1 },
          { text: '分析報告、建立內容模板、規劃策略', score: 2 },
          { text: '搭建自動化系統、開發工具、串接多個 AI 工作流', score: 3 },
        ]
      },
      {
        id: 10,
        q: '你有教過別人用 Claude 嗎？',
        opts: [
          { text: '自己都還在摸索，沒教過', score: 0 },
          { text: '推薦朋友用過，但沒深入教', score: 1 },
          { text: '有帶同事上手，分享過實用技巧', score: 2 },
          { text: '有系統性地教過團隊或社群，有自己的教學方法論', score: 3 },
        ]
      },
      {
        id: 11,
        q: '「Context Window（上下文窗口）」你怎麼管？',
        opts: [
          { text: '沒聽過這個概念', score: 0 },
          { text: '知道對話太長 Claude 會忘記前面的內容', score: 1 },
          { text: '會分段任務、在關鍵處重申指令來管理', score: 2 },
          { text: '精確控制上下文：壓縮歷史、結構化記憶、搭配外部知識庫', score: 3 },
        ]
      },
      {
        id: 12,
        q: 'Claude Code（命令列版）或 API 你碰過嗎？',
        opts: [
          { text: '那是什麼？只用過網頁版', score: 0 },
          { text: '聽過 Claude Code，知道它是給工程師用的', score: 1 },

    const LEVEL_ORDER = ['lv7','lv6','lv5','lv4','lv3','lv2','lv1'];

      lv4: '#D4A574', lv3: '#E8A87C', lv2: '#FF8906', lv1: '#FF5C5C'

    // ═══════════════════════════════════
    //  STATE
    // ═══════════════════════════════════
    const state = {
      screen: 'welcome',
      qi: 0,
      answers: {},
      name: '',
      email: '',
      result: null,

    // ═══════════════════════════════════
    //  SCORING
    // ═══════════════════════════════════
    function calcResult() {
      let total = 0;
      QUESTIONS.forEach(q => {
        const sel = state.answers[q.id];
        if (sel !== undefined) total += q.opts[sel].score;
      });
      const max = QUESTIONS.length * 3;
      let level;
      if (total <= 5)       level = 'lv7';
      else if (total <= 12) level = 'lv6';
      else if (total <= 20) level = 'lv5';
      else if (total <= 28) level = 'lv4';
      else if (total <= 34) level = 'lv3';
      else if (total <= 40) level = 'lv2';
      else                  level = 'lv1';
      return { total, max, pct: Math.round((total / max) * 100), level };
    }

    // ═══════════════════════════════════
    //  RENDER
    // ═══════════════════════════════════
    function render() {
      const app = document.getElementById('app');
      switch (state.screen) {
        case 'welcome': app.innerHTML = htmlWelcome(); break;
        case 'quiz':    app.innerHTML = htmlQuiz(); break;
        case 'form':    app.innerHTML = htmlForm(); break;
        case 'result':  app.innerHTML = htmlResult(); break;
      }
      bind();
      if (state.screen === 'result') {
        requestAnimationFrame(() => {
          const fill = document.querySelector('.score-fill');
          if (fill) fill.style.width = state.result.pct + '%';
          document.querySelectorAll('.gauge-seg').forEach(seg => {
            const idx = LEVEL_ORDER.indexOf(seg.dataset.lv);
            const resultIdx = LEVEL_ORDER.indexOf(state.result.level);
            if (idx <= resultIdx) seg.classList.add('active');
          });
        });
      }
    }

    function htmlWelcome() {
      return `
        <div class="welcome">
          <div class="welcome-emoji">🎮</div>
          <h1>你是 Claude <span class="accent">幾段</span>高手？</h1>

          <div class="level-preview">
            ${LEVEL_ORDER.map(lv => `
              <span class="lp-dot">

                ${LEVELS[lv].name}
              </span>
            `).join('')}
          </div>

            <span>📝 15 題</span>
            <span>·</span>
            <span>⏱ 約 3 分鐘</span>

          <button class="btn-primary" data-action="start">開始測驗 →</button>
          <p class="footer-note">
            <a href="../meetup-website/" style="color:var(--text-muted); text-decoration:none;">台中 Claude 使用者小聚</a> 出品
          </p>
        </div>`;
    }

    function htmlQuiz() {
      const q = QUESTIONS[state.qi];
      const pct = ((state.qi) / QUESTIONS.length * 100).toFixed(0);
      const selected = state.answers[q.id];
      const labels = ['A', 'B', 'C', 'D'];
      return `
        <div class="question-screen">
          <div class="progress-wrap">
            <span class="progress-label">${state.qi + 1}/${QUESTIONS.length}</span>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
          ${state.qi > 0 ? '<button class="back-btn" data-action="back">\u2190 上一題</button>' : ''}
          <div class="q-number">Question ${state.qi + 1}</div>
          <p class="q-text">${q.q}</p>
          <div class="options">
            ${q.opts.map((o, i) => `
              <div class="option-card${selected === i ? ' selected' : ''}" data-action="select" data-idx="${i}">
                <span class="option-label">${labels[i]}.</span>${o.text}
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    function htmlResult() {

          </div>
        </div>`;

    // ═══════════════════════════════════
    //  EVENT BINDING
    // ═══════════════════════════════════
    function bind() {
      document.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', handleAction);
      });
    }

    function handleAction(e) {
      const el = e.currentTarget;
      const action = el.dataset.action;

      if (action === 'start') {
        state.screen = 'quiz';
        state.qi = 0;
        state.answers = {};
        render();
      }

      if (action === 'select') {
        const idx = parseInt(el.dataset.idx);
        const q = QUESTIONS[state.qi];
        state.answers[q.id] = idx;

        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');

        setTimeout(() => {
          if (state.qi < QUESTIONS.length - 1) {
            state.qi++;
            render();
          } else {
            state.screen = 'form';
            render();
          }
        }, 350);
      }

      if (action === 'back') {
        if (state.qi > 0) { state.qi--; render(); }
      }

      if (action === 'submit-form') {
        const name = document.getElementById('inp-name').value.trim();
        const email = document.getElementById('inp-email').value.trim();

        if (!name) {
          document.getElementById('inp-name').classList.add('error');
          document.getElementById('err-name').classList.add('show');
          return;
        }

        state.name = name;
        state.email = email;
        state.result = calcResult();
        state.screen = 'result';

        console.log('=== Quiz Submission ===');
        console.log('Name:', state.name);
        console.log('Email:', state.email || '(skipped)');
        console.log('Score:', state.result.total, '/', state.result.max);
        console.log('Level:', state.result.level, LEVELS[state.result.level].name);
        console.log('========================');

        render();
      }

      if (action === 'skip-form') {
        state.result = calcResult();
        state.screen = 'result';
        render();
      }

      if (action === 'restart') {
        state.screen = 'welcome';
        state.qi = 0;
        state.answers = {};
        state.name = '';
        state.email = '';
        state.result = null;
        render();
      }

      if (action === 'share') {
        const card = document.querySelector('.result-card');
        if (card) {
          card.style.outline = '3px solid var(--accent)';
          card.style.outlineOffset = '4px';
          setTimeout(() => {
            card.style.outline = 'none';
            card.style.outlineOffset = '0';
          }, 2000);
          alert('請截圖上方的結果卡片分享給朋友！📸\n（卡片已標記，截完圖會自動取消框線）');
        }
      }
    }

    document.addEventListener('input', e => {
      if (e.target.tagName === 'INPUT') {
        e.target.classList.remove('error');
        const errId = 'err-' + e.target.id.replace('inp-', '');
        const errEl = document.getElementById(errId);
        if (errEl) errEl.classList.remove('show');
      }
    });

    // ═══════════════════════════════════

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
